name: Deploy to GitHub Pages every hour

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache nostr-cache
        uses: actions/cache@v4
        with:
          path: nostr-cache
          key: nostr-cache-${{ github.run_id }}
          restore-keys: |
            nostr-cache-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NPUB: ${{ secrets.NPUB }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
